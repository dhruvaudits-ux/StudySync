<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>403 — Access Forbidden | StudySync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { headline: ["Poppins"], body: ["Inter"] } } } }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 font-body text-slate-800 flex items-center justify-center p-6">

    <div class="max-w-md w-full text-center space-y-6">
        <!-- Icon -->
        <div class="w-24 h-24 rounded-full bg-red-100 flex items-center justify-center mx-auto">
            <span class="material-symbols-outlined text-red-500" style="font-size: 48px;">lock</span>
        </div>

        <!-- Error Code -->
        <div>
            <p class="text-[80px] font-headline font-extrabold text-slate-200 leading-none select-none">403</p>
            <h1 class="text-2xl font-headline font-extrabold text-slate-800 -mt-2">Access Forbidden</h1>
            <p class="text-slate-500 mt-3 text-sm leading-relaxed">
                You don't have permission to view this page.<br>
                This area is restricted to administrators only.
            </p>
        </div>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center pt-2">
            <a href="/"
               class="flex items-center justify-center gap-2 px-6 py-3 rounded-xl bg-blue-600 text-white font-semibold text-sm hover:bg-blue-700 active:scale-95 transition-all shadow-sm">
                <span class="material-symbols-outlined text-lg">home</span>
                Go Home
            </a>
            <a href="javascript:history.back()"
               class="flex items-center justify-center gap-2 px-6 py-3 rounded-xl border border-slate-200 text-slate-600 font-semibold text-sm hover:bg-slate-100 active:scale-95 transition-all">
                <span class="material-symbols-outlined text-lg">arrow_back</span>
                Go Back
            </a>
        </div>
    </div>

</body>
</html>
