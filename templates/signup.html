{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-sm hover:shadow-soft dark:hover:shadow-soft-dark border border-slate-100 dark:border-slate-700/50 mt-12 md:mt-16 transition-all">
    <div class="flex justify-center mb-6 text-primary dark:text-blue-400">
        <span class="material-symbols-outlined text-5xl">menu_book</span>
    </div>
    <h2 class="font-headline text-3xl font-bold mb-8 text-center text-slate-800 dark:text-white">Join StudySync</h2>
    
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-bold text-slate-600 dark:text-slate-300 mb-2">Full Name</label>
            <input type="text" name="name" required 
                   class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700/50 focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm dark:text-white" 
                   placeholder="John Doe">
        </div>
        <div>
            <label class="block text-sm font-bold text-slate-600 dark:text-slate-300 mb-2">Email Address</label>
            <input type="email" name="email" required 
                   class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700/50 focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm dark:text-white" 
                   placeholder="john@example.com">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-bold text-slate-600 dark:text-slate-300 mb-2">Roll Number</label>
                <input type="text" name="roll_number" 
                       class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700/50 focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm dark:text-white uppercase" 
                       placeholder="EN001">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-600 dark:text-slate-300 mb-2">Division</label>
                <input type="text" name="division" 
                       class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700/50 focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm dark:text-white uppercase" 
                       placeholder="A">
            </div>
        </div>
        <div>
            <label class="block text-sm font-bold text-slate-600 dark:text-slate-300 mb-2">Phone Number</label>
            <input type="text" name="phone" 
                   class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700/50 focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm dark:text-white" 
                   placeholder="+1 (555) 000-0000">
        </div>
        <div>
            <label class="block text-sm font-bold text-slate-600 dark:text-slate-300 mb-2">Secure Password</label>
            <input type="password" name="password" required 
                   class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700/50 focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm dark:text-white" 
                   placeholder="••••••••">
        </div>
        
        <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-primary to-blue-600 hover:from-primary-dark hover:to-blue-700 dark:from-blue-500 dark:to-primary text-white font-bold rounded-xl active:scale-95 transition-all shadow-md mt-6">
            Create Account
        </button>
    </form>
    
    <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-700/50 text-center">
        <p class="text-slate-500 dark:text-slate-400 text-sm">
            Already have an account? <a href="{{ url_for('login') }}" class="text-primary dark:text-blue-400 font-bold hover:underline transition-colors">Sign In securely</a>
        </p>
    </div>
</div>
{% endblock %}
