{% extends "admin/base_admin.html" %}
{% block title %}Users{% endblock %}
{% block header_title %}User Directory{% endblock %}

{% block content %}
<div class="bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm">
    <div class="overflow-x-auto">
        <table class="w-full text-left">
            <thead>
                <tr class="bg-slate-50 dark:bg-slate-900/50 text-slate-400 text-[10px] font-black uppercase tracking-widest border-b border-slate-100 dark:border-slate-700">
                    <th class="px-8 py-5">Profile</th>
                    <th class="px-8 py-5">Role</th>
                    <th class="px-8 py-5 text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 dark:divide-slate-700">
                {% for user in users %}
                <tr class="hover:bg-slate-50/50 dark:hover:bg-slate-700/30 transition-colors">
                    <td class="px-8 py-5">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center font-bold text-slate-500 text-sm">
                                {{ user.name[:1] }}
                            </div>
                            <div>
                                <p class="font-bold text-slate-900 dark:text-white">{{ user.name }}</p>
                                <p class="text-xs text-slate-400">{{ user.email }}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-8 py-5">
                        <span class="px-2.5 py-1 rounded-full text-[10px] font-black uppercase tracking-widest
                            {% if user.role == 'admin' %} bg-purple-50 text-purple-600 dark:bg-purple-900/20 {% else %} bg-blue-50 text-blue-600 dark:bg-blue-900/20 {% endif %}">
                            {{ user.role }}
                        </span>
                    </td>
                    <td class="px-8 py-5 text-right">
                        <div class="flex items-center justify-end gap-2">
                            <form action="{{ url_for('toggle_user_role', user_id=user.id) }}" method="POST">
                                <button type="submit" class="p-2 text-slate-400 hover:text-blue-500 transition-colors" title="Toggle Role">
                                    <span class="material-symbols-outlined text-[20px]">swap_horiz</span>
                                </button>
                            </form>
                            <form action="{{ url_for('delete_user', user_id=user.id) }}" method="POST" onsubmit="return confirm('Are you sure?')">
                                <button type="submit" class="p-2 text-slate-400 hover:text-red-500 transition-colors" title="Delete User">
                                    <span class="material-symbols-outlined text-[20px]">delete</span>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
