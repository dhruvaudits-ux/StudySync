<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>StudySync Admin - {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  admin: "#0f172a",
                  "admin-sidebar": "#1e293b",
                },
                fontFamily: {
                  sans: ["Inter", "sans-serif"],
                }
              },
            },
          }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-900 font-sans text-slate-900 dark:text-slate-200 antialiased">
    
    <!-- Admin Sidebar -->
    <aside class="fixed left-0 top-0 h-screen w-64 bg-admin-sidebar text-white z-50 flex flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-white/5">
            <span class="material-symbols-outlined mr-2 text-blue-400">admin_panel_settings</span>
            <span class="font-bold text-lg tracking-tight uppercase">StudySync Admin</span>
        </div>

        <nav class="flex-1 px-4 py-8 flex flex-col gap-2">
            <a href="{{ url_for('admin_dashboard') }}" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all 
                      {% if request.endpoint == 'admin_dashboard' %} bg-blue-600 text-white shadow-lg shadow-blue-900/20 {% else %} text-slate-400 hover:text-white hover:bg-white/5 {% endif %}">
                <span class="material-symbols-outlined text-[20px]">dashboard</span>
                <span class="text-sm font-medium">Dashboard</span>
            </a>
            <a href="{{ url_for('admin_users') }}" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all
                      {% if request.endpoint == 'admin_users' %} bg-blue-600 text-white shadow-lg shadow-blue-900/20 {% else %} text-slate-400 hover:text-white hover:bg-white/5 {% endif %}">
                <span class="material-symbols-outlined text-[20px]">group</span>
                <span class="text-sm font-medium">Manage Users</span>
            </a>
            <a href="{{ url_for('admin_attendance') }}" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all
                      {% if request.endpoint == 'admin_attendance' %} bg-blue-600 text-white shadow-lg shadow-blue-900/20 {% else %} text-slate-400 hover:text-white hover:bg-white/5 {% endif %}">
                <span class="material-symbols-outlined text-[20px]">event_available</span>
                <span class="text-sm font-medium">Attendance</span>
            </a>
            <a href="{{ url_for('admin_upload') }}" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all
                      {% if request.endpoint == 'admin_upload' %} bg-blue-600 text-white shadow-lg shadow-blue-900/20 {% else %} text-slate-400 hover:text-white hover:bg-white/5 {% endif %}">
                <span class="material-symbols-outlined text-[20px]">upload_file</span>
                <span class="text-sm font-medium">Upload PDF</span>
            </a>
            
            <div class="mt-auto border-t border-white/5 pt-4">
                <a href="{{ url_for('logout') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition-all">
                    <span class="material-symbols-outlined text-[20px]">logout</span>
                    <span class="text-sm font-medium">Logout</span>
                </a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="md:ml-64 flex flex-col min-h-screen">
        <header class="h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-8 sticky top-0 z-40">
            <h1 class="text-sm font-bold uppercase tracking-widest text-slate-400">{% block header_title %}{% endblock %}</h1>
            
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-3 bg-slate-50 dark:bg-slate-900 px-4 py-1.5 rounded-full border border-slate-100 dark:border-slate-700">
                    <span class="text-xs font-bold text-slate-600 dark:text-slate-300">{{ current_user.name }}</span>
                    <div class="w-6 h-6 rounded-full bg-blue-600 text-white flex items-center justify-center text-[10px] font-black uppercase">
                        {{ current_user.name[:1] }}
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 p-8 max-w-6xl mx-auto w-full">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
